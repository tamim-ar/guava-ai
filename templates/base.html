<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GuavaAI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="{{ url_for('static', filename='js/translations.js') }}"></script>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="/">
      <img src="{{ url_for('static', filename='img\logo.png') }}" alt="logo" class="logo me-2">
      <div>
        <div class="brand-title">GuavaAI</div>
        <small class="text-muted brand-sub" data-i18n="heroSubtitle">Disease Detection</small>
      </div>
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"><i class="fa fa-bars"></i></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav ms-auto align-items-lg-center">
        <li class="nav-item"><a class="nav-link" href="/" data-i18n="home">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/about" data-i18n="about">About</a></li>
        <li class="nav-item"><a class="nav-link" href="/help" data-i18n="help">Help</a></li>
        <li class="nav-item"><a class="nav-link" href="/developer" data-i18n="developer">Developer</a></li>
        <li class="nav-item"><a class="nav-link" href="/contact" data-i18n="contact">Contact</a></li>
        <li class="nav-item ms-2">
          <button id="langToggle" class="btn btn-sm btn-outline-secondary">বাংলা</button>
        </li>
        <li class="nav-item ms-2">
          <div class="form-check form-switch mt-1">
            <input class="form-check-input" type="checkbox" id="themeSwitch">
            <label class="form-check-label small" for="themeSwitch" data-i18n="dark">Dark</label>
          </div>
        </li>
      </ul>
    </div>
  </div>
</nav>

<main class="py-4">
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</main>

<footer class="footer mt-5 py-4 bg-white shadow-sm">
  <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
    <div class="mb-2 mb-md-0">
      <strong>GuavaAI</strong> &copy; <span id="year"></span> · <span data-i18n="allRightsReserved">All rights reserved.</span>
    </div>
    <div>
      <a href="#" class="me-3 text-muted" data-i18n="privacy">Privacy</a>
      <a href="#" class="me-3 text-muted" data-i18n="terms">Terms</a>
      <a href="#" class="text-muted" data-i18n="support">Support</a>
    </div>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
